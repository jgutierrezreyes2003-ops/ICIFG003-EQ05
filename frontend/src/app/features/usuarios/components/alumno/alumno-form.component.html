<div class="card border-0 shadow-sm rounded-4 mb-4 form-card">
  <div class="card-body p-4">
    <div class="d-flex align-items-center gap-3 mb-4">
      <div class="icon-box bg-colegio-blue-light text-colegio-blue rounded-4 d-flex align-items-center justify-content-center">
        👤
      </div>
      <div>
        <h4 class="fw-bold text-dark mb-1">
          {{ editando ? 'Editar alumno' : 'Registrar alumno' }}
        </h4>
        <p class="text-secondary mb-0">Completa los datos básicos del estudiante.</p>
      </div>
    </div>

    <form (ngSubmit)="guardar()">
      <div class="row g-3">
        <div class="col-12 col-md-7">
          <label class="form-label fw-semibold text-secondary small">Nombre del alumno</label>
          <input
            type="text"
            class="form-control bg-light rounded-3 py-2"
            placeholder="Ej: Juan Pérez"
            [(ngModel)]="alumno.nombre"
            name="nombre"
            required>
        </div>

        <div class="col-12 col-md-5">
          <label class="form-label fw-semibold text-secondary small">Curso</label>
          <input
            type="text"
            class="form-control bg-light rounded-3 py-2"
            placeholder="Ej: 4 Medio A"
            [(ngModel)]="alumno.curso"
            name="curso"
            required>
        </div>
      </div>

      <div class="d-flex flex-column flex-md-row gap-2 mt-4">
        <button type="submit" class="btn btn-colegio-blue fw-bold px-4 py-2 rounded-3 shadow-sm">
          {{ editando ? 'Actualizar alumno' : 'Guardar alumno' }}
        </button>

        <button type="button" class="btn btn-outline-secondary fw-bold px-4 py-2 rounded-3" (click)="limpiar()">
          Limpiar
        </button>
      </div>
    </form>
  </div>
</div>
