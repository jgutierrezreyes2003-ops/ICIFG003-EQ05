<div class="login-wrapper bg-light min-vh-100 d-flex align-items-center justify-content-center p-3">
  
  <div class="card border-0 shadow-lg login-card rounded-4 overflow-hidden">
    <div class="row g-0">
      
      <div class="col-md-5 d-none d-md-flex bg-colegio-blue flex-column justify-content-center align-items-center text-white p-4 position-relative overflow-hidden">
        <div class="overlay-pattern"></div>
        
        <img src="/Logo.png" alt="Logo Colegio Marcela Paz" class="mb-4 logo-login" style="z-index: 1;">
        <h3 class="fw-bold text-center mb-0" style="z-index: 1;">Colegio Marcela Paz</h3>
        <p class="text-colegio-yellow text-center mt-2 fs-5" style="z-index: 1;">Portal Institucional</p>
      </div>

      <div class="col-md-7 d-flex flex-column justify-content-center p-4 p-lg-5 bg-white">
        
        <div class="d-md-none text-center mb-4">
          <img src="/Logo.png" alt="Logo" height="60" class="mb-2">
          <h4 class="fw-bold text-colegio-blue">Colegio Marcela Paz</h4>
        </div>

        <h4 class="fw-bold text-dark mb-1">Bienvenido de vuelta</h4>
        <p class="text-secondary mb-4">Ingresa tus credenciales para acceder al sistema.</p>

        <form (ngSubmit)="login()">
          
          <div class="mb-3">
            <label for="usuario" class="form-label fw-semibold text-secondary small">Usuario</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">👤</span>
              <input type="text" id="usuario" class="form-control bg-light border-start-0" 
                     placeholder="Ej: admin" [(ngModel)]="usuario" name="usuario" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="contrasena" class="form-label fw-semibold text-secondary small">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">🔒</span>
              <input type="password" id="contrasena" class="form-control bg-light border-start-0" 
                     placeholder="••••••••" [(ngModel)]="contrasena" name="contrasena" required>
            </div>
          </div>

          <button type="submit" class="btn btn-colegio-blue w-100 py-3 fw-bold shadow-sm mb-4 rounded-3">
            Iniciar Sesión
          </button>

          <div class="text-center mt-auto">
            <a routerLink="/" class="text-decoration-none text-secondary small hover-blue fw-medium">
              ← Volver a la página principal
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>

</div>
