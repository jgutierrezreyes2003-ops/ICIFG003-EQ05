<div class="login-page bg-light min-vh-100 d-flex align-items-center justify-content-center">

  <div class="card border-0 shadow rounded-4 p-4" style="width: 100%; max-width: 420px;">

    <div class="text-center mb-4">
      <img src="/Logo.png" alt="Logo" class="mb-3" style="max-height: 80px;">
      <h4 class="fw-bold text-dark mb-1">Bienvenido de vuelta</h4>
      <p class="text-secondary mb-4">
        Ingresa tus credenciales para acceder al sistema.
      </p>
    </div>

    @if (mensajeSuccess) {
      <div class="alert alert-success text-center py-2">
        {{ mensajeSuccess }}
      </div>
    }

    @if (mensajeError) {
      <div class="alert alert-danger text-center py-2">
        {{ mensajeError }}
      </div>
    }

    <form (ngSubmit)="login()">

      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <input
          type="text"
          class="form-control rounded-3"
          name="usuario"
          [(ngModel)]="usuario"
          placeholder="Ingrese su usuario">
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <input
          type="password"
          class="form-control rounded-3"
          name="contrasena"
          [(ngModel)]="contrasena"
          placeholder="Ingrese su contraseña">
      </div>

      <button
        type="submit"
        class="btn btn-colegio-blue w-100 fw-bold py-2 rounded-3 shadow-sm">
        Iniciar Sesión
      </button>

    </form>

  </div>

</div>
